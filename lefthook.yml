pre-push:
  jobs:
    # Too many vulnerabilities to run this
    # - name: packages audit
    #   tags:
    #     - frontend
    #     - security
    #   run: npm audit
    - name: test
      tags:
        - test
      run: npm test

pre-commit:
  parallel: false
  jobs:
    - name: lint
      run: npx eslint {staged_files}
      glob: "*.{js,mjs,ts,json,css,scss}"
      stage_fixed: true
    - name: format
      run: npx prettier -uw {staged_files}
      stage_fixed: true
